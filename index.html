<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Engineering Decision Log</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#/">
      <span class="brand-mark">⚙</span>
      <span class="brand-text">Engineering Decision Log</span>
    </a>
    <nav class="topnav">
      <a href="#/new" class="btn btn-primary">+ New Decision</a>
    </nav>
  </header>

  <main id="app" class="app-root">
    <!-- Views are rendered here by js/ui.js -->
  </main>

  <footer class="footer">
    <span>Local-first MVP · data stays in your browser (localStorage)</span>
    <span id="storage-stats"></span>
  </footer>

  <!-- Load order matters: schema → storage → catalog → export → ui → app -->
  <script src="js/schema.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/catalog.js"></script>
  <script src="js/export.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
